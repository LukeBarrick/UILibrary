<nav class="navbar">
  <div class="logo">
    <ng-content select="[logo]"></ng-content>
  </div>

  <section class="normal-nav-links d-flex flex-row flex-nowrap justify-content-flex-start w-100 h-100" #navLinks>
    <ul class="nav-links"> 
      <li class="nav-item d-flex" *ngFor="let link of links; index as i; trackBy: trackByFn">

        @if (link.children) {
          <section class="w-100">
            <uilibrary-navigation-dropdown [label]="link.label" [links]="link.children"></uilibrary-navigation-dropdown>
          </section>
        } @else {
          <section class="w-100">
            <uilibrary-navigation-option [link]="link"></uilibrary-navigation-option>
          </section>
        }
      </li>
    </ul>

    @if (overflowLinks.length) {
      <div class="more">
        <uilibrary-navigation-dropdown label="More" [links]="overflowLinks"></uilibrary-navigation-dropdown>
      </div>
    }
  </section>
  
  <section class="small-nav-links d-flex flex-row flex-nowrap justify-content-space-between w-100 h-100" #navLinks>
    <ul class="nav-links">
      <div class="menu">
        <uilibrary-navigation-dropdown label="Menu" [links]="allNavigationLinks">
          @if (showExtraMobileMenuContent) {
            <ng-content select="[extraMobileMenuContent]"></ng-content>
          }
        </uilibrary-navigation-dropdown>
      </div>
    </ul>
  </section>

  @if (showRightAlignedContent) {
    <div class="navigation-right-aligned-content" [class.hide-on-mobile]="hideRightAllignedContentOnMobile">
      <ng-content select="[rightAlignedContent]"></ng-content>
    </div>
  }
</nav>
