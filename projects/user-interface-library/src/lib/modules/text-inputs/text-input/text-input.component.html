<div class="formfield d-flex flex-row">
  <div class="input-form">
    <div class="input-field" >
      <input type="text" placeholder="" [(ngModel)]="value" [disabled]="disabled" (change)="handleChange($event)" (blur)="markAsTouched()"/> 
      <div class="input-label">
        <span class="label-name">
          <ng-content select="[label]"></ng-content>
        </span>
      </div>
    </div>
  </div>
</div>
