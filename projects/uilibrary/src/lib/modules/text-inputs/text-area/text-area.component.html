<div class="w-100 d-flex flex-row">
  <div class="textarea-form">
    <label class="textarea-field">
      <textarea [attr.autocomplete]="autocomplete" [id]="id" type="text" [placeholder]="placeholder" [(ngModel)]="value"
        [disabled]="isDisabled" (input)="handleChange($event)" (blur)="markAsTouched()"></textarea>
      <div class="textarea-label-name">
        <ng-content></ng-content>
      </div>
    </label>
  </div>
</div>
