<nav class="navbar">
  <div class="logo">
    <img src="assets/logo.png" height="35" width="100" alt="Logo">
  </div>

    <section class="d-flex flex-row flex-nowrap justify-content-start w-100" #navLinks>
      <ul class="nav-links">
        <li class="nav-item" *ngFor="let link of visibleLinks; index as i; trackBy: trackByFn"><a [href]="link.route">{{ link.label }}</a></li>
      </ul>
      <div class="more" *ngIf="overflowLinks.length > 0">
        <a href="#" class="more-link" (click)="toggleDropdown($event)">More</a>
        <ul class="more-dropdown" [class.show]="dropdownVisible">
          <li *ngFor="let link of overflowLinks;  index as i; trackBy: trackByFn"><a [href]="link.route">{{ link.label }}</a></li>
        </ul>
      </div>
    </section>
    <div *ngIf="showUserDetails" class="user-details">
      <ng-content select="[userdetails]"></ng-content>
    </div>
</nav>
