<div class="d-flex flex-row">
  <ng-select class="custom" [(ngModel)]="value" [items]="items" [disabled]="disabled" bindLabel="label"
    bindValue="value" [compareWith]="compareFn" (change)="handleChange($event)" [loading]="loading"
    [loadingText]="loadingText" [multiple]="multiple" [maxSelectedItems]="maxSelectedItems"
    [hideSelected]="hideSelected" [clearSearchOnAdd]="clearSearchOnAdd" [readonly]="readonly"
    [placeholder]="placeholder" [notFoundText]="notFoundText" [markFirst]="markFirst"
    [clearOnBackspace]="clearOnBackspace" [clearable]="clearable" [closeOnSelect]="closeOnSelect"
    [searchable]="searchable" [searchFn]="searchFn" [isOpen]="isOpen" [trackByFn]="trackByFn"
    [virtualScroll]="virtualScroll">
    <ng-template ng-label-tmp let-item="item">
      <ng-container *ngTemplateOutlet="labelTemplate; context: { $implicit: item }"></ng-container>
    </ng-template>
    <ng-template ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
      <ng-container *ngTemplateOutlet="optionTemplate; context: { $implicit: item }"></ng-container>
    </ng-template>
  </ng-select>
  <div class="d-flex flex-row align-items-center">
    <ng-content select="[required]"></ng-content>
    <ng-content select="[tooltip]"></ng-content>
  </div>
</div>
<ng-content></ng-content>
