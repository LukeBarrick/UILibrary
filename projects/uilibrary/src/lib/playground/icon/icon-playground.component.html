<h1>Icons</h1>
<div class="d-flex flex-column">
    <section class="small">
        <h3>Sizes</h3>
        <div class="d-flex flex-row">
            <uilibrary-icon name="icon-accommodation" size="small"></uilibrary-icon>
            <uilibrary-icon name="icon-accommodation" size="medium"></uilibrary-icon>
            <uilibrary-icon name="icon-accommodation" size="large"></uilibrary-icon>
        </div>
    </section>
    <section class="small">
        <h3>Appearances</h3>
        <div class="d-flex flex-row">
            <uilibrary-icon name="icon-accommodation" size="large" appearance="primary"></uilibrary-icon>
            <uilibrary-icon name="icon-accommodation" size="large" appearance="secondary"></uilibrary-icon>
            <uilibrary-icon name="icon-accommodation" size="large" appearance="tertiary"></uilibrary-icon>
            <uilibrary-icon name="icon-accommodation" size="large" appearance="light-gray"></uilibrary-icon>
            <uilibrary-icon name="icon-accommodation" size="large" appearance="dark-gray"></uilibrary-icon>
            <div style="color: pink;">
                <uilibrary-icon name="icon-accommodation" size="large" appearance="custom"></uilibrary-icon>
            </div>
        </div>
    </section>
    <section class="medium">
        <h3>Icon Gallery</h3>
        <div class="d-flex flex-row" style="flex-wrap: wrap; gap: 8px;">
          @for(icon of availableIcons; track icon) {
            <uilibrary-icon size="medium" [name]="icon"></uilibrary-icon>
          }
        </div>
    </section>
</div>
