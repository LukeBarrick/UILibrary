<div class="w-100 d-flex flex-row">
  <div class="input-form">
    <label class="input-field">
      <input [attr.autocomplete]="autocomplete" [id]="id" type="text" [placeholder]="placeholder" [(ngModel)]="value"
        [disabled]="isDisabled" (input)="handleChange($event)" (blur)="markAsTouched()" />
      <div class="label-name">
        <ng-content></ng-content>
      </div>
    </label>
  </div>
</div>
