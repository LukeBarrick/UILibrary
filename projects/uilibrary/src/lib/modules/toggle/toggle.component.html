<div class="switch-container d-flex">
  <label class="switch d-flex align-items-center" [ngClass]="{'large': labelSize === 'large'}">
    <input class="order-base d-none" [id]="id" input type="checkbox" [(ngModel)]="value" [disabled]="disabled" (click)="handleChange()" [attr.aria-checked]="value">
    <span class="slider"></span>
    <div [ngClass]="{'visually-hidden': hideLabel === true, 'order-1 mis-4': labelPosition == LabelPosition.Right, 'order-n1 mie-4': labelPosition == LabelPosition.Left}">
      <ng-content></ng-content>
    </div>
  </label>
</div>
