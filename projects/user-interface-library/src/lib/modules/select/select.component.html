  <ng-select class="custom" [(ngModel)]="value" [items]="items" [disabled]="isDisabled" bindLabel="label"
  bindValue="value" [compareWith]="compareFn"
  (change)="handleChange($event)" (focus)="onTouched($event)" [loading]="loading" [loadingText]="loadingText"
  [multiple]="multiple" [maxSelectedItems]="maxSelectedItems" [hideSelected]="hideSelected"
  [clearSearchOnAdd]="clearSearchOnAdd" [readonly]="readonly" [placeholder]="placeholder" [notFoundText]="notFoundText"
  [markFirst]="markFirst" [clearOnBackspace]="clearOnBackspace" [clearable]="clearable" [closeOnSelect]="closeOnSelect"
  [searchable]="searchable" [searchFn]="searchFn" [isOpen]="isOpen" [trackByFn]="trackByFn"
  [virtualScroll]="virtualScroll">
  <ng-template ng-label-tmp let-item="item">
    <ng-container *ngTemplateOutlet="labelTemplate; context: { $implicit: item }"></ng-container>
  </ng-template>
  <ng-template ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
    <ng-container *ngTemplateOutlet="optionTemplate; context: { $implicit: item }"></ng-container>
  </ng-template>
</ng-select>
