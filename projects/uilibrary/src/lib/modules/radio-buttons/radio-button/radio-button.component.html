<div class="d-flex flex-row input-radio align-items-center">
  <div class="form-check">
    <div class="check-input">
      <input [id]="id" type="radio" [value]="value" [checked]="selected" [disabled]="disabled" (change)="selectButton()"/>
    </div>
  </div>
  <div class="check-label" [ngClass]="{'left': labelPosition === 'left', 'right': labelPosition === 'right'}">
    <label [for]="id"><ng-content></ng-content></label>
  </div>
</div>
