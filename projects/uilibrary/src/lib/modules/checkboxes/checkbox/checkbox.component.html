<div class="d-flex flex-row checkbox-container">
  <div [ngClass]="{'branded': variant === 'branded', 'pass': variant === 'pass', 'fail': variant === 'fail'}">
    <div  [ngClass]="{'checkbox-small': size === 'small', 'checkbox': size === 'large'}">
      <label class="check-input" [ngClass]="{'label-left': labelPosition === 'left'}">
        <div class="circle2"></div>
        <input [id]="id" type="checkbox" [(ngModel)]="value" [disabled]="isDisabled" (click)="handleChange()" (onKeyPress)="handleChange()" [attr.aria-checked]="value"/>
        <label [for]="id"><ng-content></ng-content></label>
      </label>
      <div>
      </div>
    </div>
  </div>
</div>
