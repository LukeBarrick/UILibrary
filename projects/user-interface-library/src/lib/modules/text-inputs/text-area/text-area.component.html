<div>
  <div class="formfield d-flex flex-row">
    <div class="textarea-form">
      <div class="textarea-field">
        <textarea type="text" [placeholder]="placeholder" [(ngModel)]="value" [disabled]="isDisabled" (input)="handleChange($event)" (blur)="markAsTouched()"></textarea>
        <div class="textarea-label">
          <label class="textarea-label-name">
            <ng-content></ng-content>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
