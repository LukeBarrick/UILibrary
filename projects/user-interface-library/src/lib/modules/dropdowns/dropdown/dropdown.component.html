<div class="d-flex flex-row">
  <div ngbDropdown class="dropdown-parent-custom">
    <div class="dropdown-input-custom" ngbDropdownToggle>
      <span><ng-content select="[input]"></ng-content></span>
    </div>
    <div id="transaction" class="dropdown-option-custom transaction-text-alignment" ngbDropdownMenu>
      <ng-content select="[default]"></ng-content>
      <ng-content select="[option]"></ng-content>
    </div>
  </div>
  <div class="d-flex flex-row align-items-center">
    <ng-content select="[tooltip]"></ng-content>
    <ng-content select="[required]"></ng-content>
  </div>
</div>
<ng-content></ng-content>
