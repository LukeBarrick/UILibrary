<div class="datepicker-container">
  <input [id]="id" type="text"  [ngClass]="{'datepicker-input-focus': isOpen}" [placeholder]="placeholder" (click)="open()"/>
  <div class="datepicker-label" [ngClass]="{'datepicker-label-float': isOpen}">
    <label [for]="id">
      <ng-content></ng-content>
    </label>
  </div>
  <div class="datepicker-calendar-container" *ngIf="isOpen">
    <button (click)="previous()">prev</button>
    <button (click)="next()">next</button>
    <div class="calendar">
      <!-- @for(month of ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Nov', 'Dec']; track month) {
        {{month}}
      } -->
      @for(day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']; track day) {
        <div class="day-name">{{day}}</div>
      }
      
      @for(week of weeksInMonth; track week;) {
        @for(day of week; track day) {
          @if(day !== null) {
            <div class="day">{{day + 1}}</div>
          } @else {
            <div class="day"></div>
          }
        
        }
      }
    </div>
  </div>
</div>
